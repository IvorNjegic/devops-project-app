name: CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read
    packages: write

jobs:
    build-scan-push:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                service: [api, frontend, worker]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set lowercase repository name
              run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

            - name: Build Docker image
              run: |
                  docker build \
                    -t ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }} \
                    -t ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:latest \
                    ./${{ matrix.service }}

            - name: Trivy vulnerability scan
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }}
                  format: table
                  severity: CRITICAL

            - name: Push image to GHCR
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              run: |
                  docker push ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.sha }}
                  docker push ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:latest
